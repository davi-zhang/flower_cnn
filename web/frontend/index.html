<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Flower Classifier</title>
    <style>
        :root {
            --deep: #1c1f2b;
            --accent: #ffb347;
            --accent-strong: #ff7e5f;
            --surface: rgba(255, 255, 255, 0.92);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 20%, #423c88, #1c1f2b 55%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        main {
            width: min(420px, 100%);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.6));
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 24px 80px rgba(28, 31, 43, 0.6);
            color: #1c1f2b;
            position: relative;
            overflow: hidden;
        }

        main::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255, 123, 87, 0.2), transparent 55%);
            pointer-events: none;
        }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 2rem;
            letter-spacing: 0.08em;
        }

        p {
            margin: 0 0 1.5rem;
            color: rgba(28, 31, 43, 0.8);
        }

        label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 500;
        }

        input[type=file] {
            width: 100%;
        }

        button {
            width: 100%;
            border: none;
            padding: 0.95rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(120deg, var(--accent), var(--accent-strong));
            color: #1c1f2b;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 12px 30px rgba(255, 126, 95, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        button:not(:disabled):hover {
            transform: translateY(-2px);
        }

        #status {
            margin-top: 1rem;
            font-size: 0.95rem;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>Flower Classifier</h1>
        <p>Upload a bloom and let the mobile model tell you which species it is.</p>

        <label for="img">Choose a photo</label>
        <input type="file" id="img" accept="image/*">
        <button id="predict-btn" type="button" onclick="upload()" disabled>Predict</button>
        <div id="status"></div>
    </main>

    <script>
        const fileInput = document.getElementById("img");
        const status = document.getElementById("status");
        const button = document.getElementById("predict-btn");

        fileInput.addEventListener("change", () => {
            button.disabled = !fileInput.files.length;
            status.textContent = "";
        });

        async function upload() {
            if (!fileInput.files.length) {
                status.textContent = "Choose a file first.";
                return;
            }

            button.disabled = true;
            status.textContent = "Uploading and running inference...";

            const form = new FormData();
            form.append("image", fileInput.files[0]);

            try {
                const response = await fetch("/predict", { method: "POST", body: form });
                if (!response.ok) {
                    throw new Error(`Server ${response.status}`);
                }

                const { result } = await response.json();
                status.textContent = `Model thinks this is species #${result}.`;
            } catch (error) {
                status.textContent = `Prediction failed: ${error.message}`;
            } finally {
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
